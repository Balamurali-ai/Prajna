{
  "name": "Feature Request",
  "description": "Suggest a new feature for the platform",
  "title": "[Feature] ",
  "labels": ["enhancement"],
  "body": [
    {
      "type": "textarea",
      "id": "problem",
      "attributes": { "label": "Problem Statement", "description": "What problem does this solve?" },
      "validations": { "required": true }
    },
    {
      "type": "textarea",
      "id": "solution",
      "attributes": { "label": "Proposed Solution", "description": "How should we solve it?" },
      "validations": { "required": true }
    },
    {
      "type": "textarea",
      "id": "alternatives",
      "attributes": { "label": "Alternatives Considered" }
    }
  ]
}
