{
  "name": "Bug Report",
  "description": "Report a bug in the platform",
  "title": "[Bug] ",
  "labels": ["bug"],
  "body": [
    {
      "type": "textarea",
      "id": "description",
      "attributes": { "label": "Bug Description" },
      "validations": { "required": true }
    },
    {
      "type": "textarea",
      "id": "reproduction",
      "attributes": { "label": "Steps to Reproduce" },
      "validations": { "required": true }
    },
    {
      "type": "textarea",
      "id": "expected",
      "attributes": { "label": "Expected Behavior" }
    },
    {
      "type": "textarea",
      "id": "actual",
      "attributes": { "label": "Actual Behavior" }
    },
    {
      "type": "input",
      "id": "environment",
      "attributes": { "label": "Environment (OS, browser, etc.)" }
    }
  ]
}
